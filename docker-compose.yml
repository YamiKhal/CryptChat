services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: darkchat
    ports:
      # Host 5433 to avoid clashing with other local Postgres instances.
      # In-container port stays 5432; the backend service connects via db:5432.
      - "5433:5432"
    volumes:
      - darkchat_pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@db:5432/darkchat
      JWT_SECRET: change_this_to_a_long_random_string
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  darkchat_pgdata:
